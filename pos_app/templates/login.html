<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - {{ shop_settings.shop_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-bg">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-header login-header text-white">
                        <h4 class="mb-0">{{ shop_settings.shop_name }}</h4>
                    </div>
                    <div class="card-body p-4">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label">User Name</label>
                                <input type="text" name="username" id="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Role (auto selected)</label>
                                <input type="text" id="role-display" class="form-control" placeholder="Owner / Technician / Cashier" readonly>
                            </div>
                            <button class="btn btn-primary w-100">Login</button>
                        </form>
                        <hr>
                        <div class="small text-muted">
                            Default login: <strong>admin</strong> / <strong>admin123</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const usernameInput = document.getElementById('username');
        const roleDisplay = document.getElementById('role-display');
        async function fetchRole() {
            const username = usernameInput.value.trim();
            if (!username) {
                roleDisplay.value = '';
                return;
            }
            try {
                const response = await fetch(`/api/user-role?username=${encodeURIComponent(username)}`);
                const data = await response.json();
                roleDisplay.value = data.role || '';
            } catch (error) {
                roleDisplay.value = '';
            }
        }
        usernameInput.addEventListener('blur', fetchRole);
        usernameInput.addEventListener('input', () => {
            if (!usernameInput.value.trim()) {
                roleDisplay.value = '';
            }
        });
    </script>
</body>
</html>
